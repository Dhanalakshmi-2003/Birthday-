<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Batcave Protocol</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;600&display=swap');

:root {
    --gold: #d4af37;
    --black: #050505;
}

* { box-sizing: border-box; }

body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    background-color: var(--black);
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
}

/* Background */
.bg-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: -2;
}
.bg-img {
    width: 100%; height: 100%;
    background: url('https://images.unsplash.com/photo-1531259683007-016a7b628fc3?auto=format&fit=crop&w=1000&q=80');
    background-size: cover;
    background-position: center;
    filter: grayscale(100%) brightness(0.15);
}

/* Rain */
.rain {
    position: fixed;
    width: 100%; height: 100%;
    background: url('https://www.transparenttextures.com/patterns/stardust.png');
    opacity: 0.3;
    z-index: -1;
    animation: rainMove 1s linear infinite;
}
@keyframes rainMove {
    from { background-position: 0% 0%; }
    to { background-position: 10% 100%; }
}

/* Scanner */
#scanner {
    position: fixed;
    width: 100%; height: 100%;
    background: var(--black);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.8s ease;
}
.scan-line {
    position: absolute;
    width: 100%; height: 4px;
    background: var(--gold);
    box-shadow: 0 0 20px var(--gold);
    top: 0;
    animation: scanAnim 2.5s ease-in-out forwards;
}
@keyframes scanAnim {
    0% { top: 0; }
    100% { top: 100%; }
}

/* Main UI */
#main-ui {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 30px 20px;
    opacity: 0;
    transition: opacity 1s ease-in;
}

.glow-zoom-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2rem, 8vw, 4rem);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #fff;
    text-shadow: 0 0 20px var(--gold);
    animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
}

.bat-icon {
    font-size: 3.5rem;
    margin: 20px 0;
    transition: all 0.6s ease;
}

#qualities {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin: 20px 0;
    font-family: 'Cinzel', serif;
    color: var(--gold);
}

.info-box {
    max-width: 500px;
    padding: 25px;
    background: rgba(0,0,0,0.7);
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
}

.bat-btn {
    margin-top: 20px;
    padding: 14px 30px;
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    cursor: pointer;
}

#flash {
    position: fixed;
    width: 100%; height: 100%;
    background: white;
    opacity: 0;
    pointer-events: none;
}

/* Sparkles */
.sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--gold), 0 0 15px var(--gold);
    animation: floatUp linear infinite;
}
@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    20% { opacity: 1; }
    100% { transform: translateY(-120vh); opacity: 0; }
}

/* Heart Burst */
.heart {
    position: fixed;
    font-size: 28px;
    animation: burst 1.6s ease-out forwards;
    text-shadow: 0 0 10px var(--gold), 0 0 25px var(--gold);
}
@keyframes burst {
    0% { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
}
</style>
</head>

<body onload="reveal()">

<div id="flash"></div>

<div id="scanner">
<div class="scan-line"></div>
<div style="color:var(--gold); letter-spacing:4px;">DECRYPTING ACCESS...</div>
</div>

<div class="bg-wrap"><div class="bg-img"></div></div>
<div class="rain"></div>

<div id="main-ui">

<div style="letter-spacing:5px;color:#666;">VERIFIED: KISHORE</div>
<div style="color:var(--gold);letter-spacing:6px;">HAPPY BIRTHDAY </div>

<h1 class="glow-zoom-title">Mr. Batman</h1>

<div id="bat-logo" class="bat-icon">🦇</div>

<div id="qualities">
<div>UNYIELDING WILL</div>
<div>MASTER DETECTIVE</div>
<div>GUARDIAN OF GOTHAM</div>
<div>THE DARK KNIGHT</div>
</div>

<div class="info-box">
<p id="wish-text">
A legend doesn't age; he evolves. Tonight, Gotham stands silent in your honor.
</p>
</div>

<button id="action-btn" class="bat-btn" onclick="enterBatcave()">
Enter the Batcave
</button>

</div>

<script>
function reveal(){
setTimeout(()=>{
document.getElementById('scanner').style.opacity='0';
setTimeout(()=>{
document.getElementById('scanner').style.display='none';
document.getElementById('main-ui').style.opacity='1';
},800);
},3000);
}

function enterBatcave(){
const batLogo=document.getElementById('bat-logo');
const qualities=document.getElementById('qualities');
const btn=document.getElementById('action-btn');
const flash=document.getElementById('flash');
const wishText=document.getElementById('wish-text');

flash.style.opacity='0.4';
setTimeout(()=>flash.style.opacity='0',200);

batLogo.style.transform='scale(0) rotate(360deg)';
batLogo.style.opacity='0';

setTimeout(()=>{
batLogo.style.display='none';
qualities.style.display='flex';
wishText.innerHTML="PROFILING COMPLETE... <br><b>Access Secured.</b>";
btn.innerText="OPEN LETTER";

btn.onclick=function(){
btn.style.display="none";
qualities.style.display="none";
startTyping();
createSparkles();
};
},600);
}

function startTyping(){
const wishText=document.getElementById('wish-text');

const letter=`Dear pa❤️,

From the moment you entered my life,
everything around me began to feel different.
Brighter. Warmer. More meaningful.

You are my strength when I feel weak,
my calm when the world feels loud,
and my light when darkness surrounds me.

In your smile, I find peace.
In your voice, I find comfort.
In your presence, I find home.

Every moment spent with you becomes a memory
I hold close to my heart.
Even the simplest conversations with you
feel magical and unforgettable.

You inspire me to be better,
to dream bigger,
and to love deeper.

No matter where life takes us,
no matter what challenges we face,
I promise to stand beside you,
to support you,
and to cherish you always.

Through every sunrise and every storm,
through laughter and silence,
through victories and struggles —
my heart will always choose you.

You are not just part of my story.
You are my favorite chapter.
You are my forever.

Forever and always yours ❤️`;
wishText.innerHTML="";
wishText.style.whiteSpace="pre-line";
wishText.style.color="#d4af37";

let i=0;
function type(){
if(i<letter.length){
wishText.innerHTML+=letter.charAt(i);
i++;
setTimeout(type,35);
}else{
heartBurst();
}
}
type();
}

function createSparkles(){
for(let i=0;i<30;i++){
let s=document.createElement("div");
s.classList.add("sparkle");
s.style.left=Math.random()*100+"vw";
s.style.bottom="-10px";
s.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(s);
}
}

function heartBurst(){
for(let i=0;i<8;i++){
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="💛";
h.style.left="50%";
h.style.top="50%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),1600);
}
}
</script>

</body>
</html>
